<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday 🎉</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            color: white;
        }
        h1 {
            margin-top: 100px;
            font-size: 50px;
        }
        p {
            font-size: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            background: white;
            color: black;
            font-size: 18px;
            cursor: pointer;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>Happy Birthday 💖</h1>
    <p>Wishing you lots of happiness and love 🥳</p>

    <button onclick="showMessage()">Click Me 🎁</button>

    <p id="msg"></p>

    <script>
        function showMessage() {
            document.getElementById("msg").innerHTML =
            "You're the best! Hope your day is amazing 🎂✨";
        }
    </script>

</body>
</html>
