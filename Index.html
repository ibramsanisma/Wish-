<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday 🎉</title>
    <style>
        body {
            text-align: center;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
            color: white;
        }
        h1 {
            font-size: 60px;
            margin-top: 100px;
        }
        p {
            font-size: 25px;
        }
        .cake {
            font-size: 80px;
        }
        button {
            padding: 10px 20px;
            font-size: 20px;
            background-color: white;
            color: #ff6f61;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>🎂 Happy Birthday! 🎂</h1>
    <p>Wishing you a day filled with love and happiness 💖</p>

    <div class="cake">🎉🎁🎂</div>

    <br><br>

    <button onclick="showMessage()">Click for Surprise 🎁</button>

    <p id="msg"></p>

    <script>
        function showMessage() {
            document.getElementById("msg").innerHTML = "You are amazing! Enjoy your special day 💫";
        }
    </script>

</body>
</html>
